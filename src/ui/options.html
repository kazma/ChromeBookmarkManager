<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bookmarkz Options</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 12px; }
    textarea { width: 100%; height: 100px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    button { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; }
    .row { margin: 12px 0; }
    label { display:block; margin-bottom: 6px; font-weight: 600; }
    code { background: #f7f7f7; padding: 2px 6px; border-radius: 6px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  </style>
</head>
<body>
  <h2>Bookmarkz Options</h2>

  <div class="grid">
    <div>
      <div class="row">
        <label>Tracking params to strip (comma separated)</label>
        <textarea id="trackingParams"></textarea>
      </div>
      <div class="row">
        <label>Keep fragments? (<code>#section</code>)</label>
        <select id="keepFragments">
          <option value="false">false</option>
          <option value="true">true</option>
        </select>
      </div>
    </div>
    <div>
      <div class="row">
        <label>Keeper folderPriority (comma; path substring; top is highest)</label>
        <textarea id="keeperFolderPriority" placeholder="Bookmarks Bar, Other Bookmarks, Mobile"></textarea>
      </div>
      <div class="row">
        <label>Keeper preferences</label>
        <div>
          <label><input type="checkbox" id="keeperPreferShallow"> preferShallow (fewer folders)</label><br/>
          <label><input type="checkbox" id="keeperPreferOlder"> preferOlder (older dateAdded)</label>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <button id="saveBtn">Save</button>
    <span id="msg"></span>
  </div>

  <script type="module" src="ui/options.js"></script>
</body>
</html>
