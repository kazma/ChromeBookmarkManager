<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bookmarkz Diff</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 24px auto; padding: 0 12px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; font-size: 12px; }
    th { background: #fafafa; text-align: left; }
    .controls { margin: 12px 0; }
    button { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Diff Preview</h1>
  <div class="controls">
    <button id="selectAll">Select All</button>
    <button id="selectNone">Select None</button>
    <button id="applySelected">Apply Selected</button>
    <span id="msg"></span>
  </div>
  <table>
    <thead>
      <tr><th>Apply</th><th>Action</th><th>Title</th><th>URL</th><th>Path</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <script type="module" src="ui/diff.js"></script>
</body>
</html>
