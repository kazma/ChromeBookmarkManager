<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bookmarkz Report</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 980px; margin: 24px auto; padding: 0 12px; }
    pre { background: #f7f7f7; padding: 12px; border-radius: 12px; overflow: auto; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    h2 { margin-top: 24px; }
    .metric { font-size: 14px; color: #333; }
  </style>
</head>
<body>
  <h1>Bookmarkz Report</h1>
  <div id="meta" class="metric"></div>
  <div class="grid">
    <div><h2>Last Scan</h2><pre id="scan"></pre></div>
    <div><h2>Last Plan</h2><pre id="plan"></pre></div>
  </div>
  <script type="module" src="ui/report.js"></script>
</body>
</html>
